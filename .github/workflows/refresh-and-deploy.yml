name: Refresh KG and deploy

# Fetches the upstream JSON-LD from marco-bolo/csv-to-json-ld, rebuilds
# data.json, and deploys to GitHub Pages. Triggered by:
#   - repository_dispatch (jsonld-rebuilt event): fired by upstream's
#     build-jsonld workflow when fresh JSON-LD has been committed.
#   - push to main: rebuilds when index.html / build_data.py change.
#   - workflow_dispatch: manual run from the Actions tab.
#
# data.json is NOT committed back to main — it's regenerated every run
# from upstream and shipped as part of the Pages artifact. Local development
# rebuilds with `python build_data.py --src ../csv-to-json-ld/remote/models/schema-jsonld`.

on:
  repository_dispatch:
    types: [jsonld-rebuilt]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch upstream JSON-LD
        run: |
          mkdir -p schema-jsonld
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/marco-bolo/csv-to-json-ld.git /tmp/c2j
          cd /tmp/c2j && git sparse-checkout set remote/models/schema-jsonld
          cp -r /tmp/c2j/remote/models/schema-jsonld/* "$GITHUB_WORKSPACE/schema-jsonld/"
          cd "$GITHUB_WORKSPACE"
          echo "entity files: $(ls schema-jsonld/ | grep -v input-metadata | wc -l)"
          echo "sidecars:     $(ls schema-jsonld/ | grep input-metadata | wc -l)"

      - name: Build data.json
        run: python build_data.py --src schema-jsonld --out data.json

      - name: Drop schema-jsonld/ before publish (not needed at runtime)
        run: rm -rf schema-jsonld

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
